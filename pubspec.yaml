name: flowery_delivery
description: "flowery_delivery"
publish_to: 'none'  # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Cupertino icons
  cupertino_icons: ^1.0.6

  # Core functionality
  bloc_test: ^10.0.0
  badges: ^3.1.1
  dio: ^5.7.0
  retrofit: ^4.4.1
  logger: ^2.5.0
  pretty_dio_logger: ^1.4.0
  json_annotation: ^4.9.0
  flutter_screenutil: ^5.9.3
  http_parser: ^4.1.2
  shared_preferences: ^2.5.0
  build_runner: ^2.4.14
  awesome_snackbar_content: ^0.1.4
  connectivity_plus: ^6.1.1
  cached_network_image: ^3.4.1
  flutter_localization: ^0.3.0
  google_fonts: ^6.2.1
  intl_utils: ^2.8.7
  country_state_city: ^0.1.6
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1

  # UI
  lottie: ^3.3.0
  flutter_hooks: ^0.21.2
  equatable: ^2.0.7
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1
  animated_text_kit: ^4.2.2
  flutter_image_slideshow: ^0.1.6
  add_to_cart_animation: ^2.0.4
  auto_size_text: ^3.0.0
  image_picker: ^1.1.2
  animate_do: ^4.2.0
  custom_refresh_indicator: ^4.0.1
  document_camera_frame: ^0.1.6
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_translation: ^0.13.0

  translator: ^1.0.3+1

  path_provider: ^2.0.15
  path: ^1.8.3
  image: ^4.0.17

  # Dependency Injection
  injectable: ^2.5.0
  get_it: ^8.0.3

  # State management
  flutter_bloc: ^9.1.0
  flutter_svg: ^2.0.16
  bloc: ^9.0.0

  # Maps
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  location: ^8.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  flutter_map_animated_marker: ^2.0.0
  flutter_map_animations: ^0.6.0
  custom_map_markers: ^0.0.2+1
  google_maps_flutter: ^2.12.1
  flutter_polyline_points: ^2.1.0

  # Firebase
  firebase_core: ^3.9.0
  firebase_crashlytics: ^4.2.0
  firebase_analytics: ^11.3.6
  cloud_firestore: ^5.6.2
  firebase_database: ^11.3.1
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^19.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_intl: ^0.0.1
  flutter_lints: ^5.0.0
  injectable_generator: ^2.6.2
  retrofit_generator: ^9.1.0
  json_serializable: ^6.8.0
  dartz: ^0.10.1
  test: ^1.25.8
  mockito: ^5.4.5
  flutter_native_splash: ^2.4.4
  icons_launcher: ^3.0.0
  rename: ^3.0.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/files/
    - assets/tessdata_config.json
    - assets/tessdata/ara.traineddata
    - lib/generated/assets.dart
    - .env.firebase
    - translations/ar.json
    - translations/en.json

  fonts:
    - family: oronteus
      fonts:
        - asset: assets/fonts/oronteus_finaeus.ttf
